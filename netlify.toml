# Netlify configuration for Sidestand
# Deployed at: https://sidestand.app

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Apple Universal Links file — must be served with JSON content-type
# and NEVER fall through to the SPA shell. This redirect makes sure
# iOS gets the AASA file when checking sidestand.app for app linking.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# SPA fallback — any unknown route serves the app shell. EXCEPT
# /.well-known which has to serve real files for Apple/Google verifiers.
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long-cache for hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Edge function: rewrite <head> on /b/<slug> with bike-specific OG tags
# so link previews in iMessage / Slack / Discord show the actual bike.
# The function reads SUPABASE_URL + SUPABASE_ANON_KEY from the Netlify
# environment (set those in the dashboard — they're the same values used
# by the Vite client).
[[edge_functions]]
  path = "/b/*"
  function = "og"
