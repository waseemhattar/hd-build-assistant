# Netlify configuration for HD Build Assistant
# Deployed at: https://harley.h-dbuilds.com

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — any unknown route serves the app shell
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long-cache for hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Edge function: rewrite <head> on /b/<slug> with bike-specific OG tags
# so link previews in iMessage / Slack / Discord show the actual bike.
# The function reads SUPABASE_URL + SUPABASE_ANON_KEY from the Netlify
# environment (set those in the dashboard — they're the same values used
# by the Vite client).
[[edge_functions]]
  path = "/b/*"
  function = "og"
