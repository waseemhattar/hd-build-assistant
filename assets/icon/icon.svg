<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- v4: refined to match reference better. Mark fills more canvas -->
  <!-- height, foot pad narrower, lever taper more pronounced. -->

  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="68%">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#070709"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g fill="#D6322C">
    <!-- Pivot head: chunky pentagonal bracket at upper-right. -->
    <!-- Bigger than v3, with more pronounced angular cuts on the -->
    <!-- upper-right and inner-left to suggest CNC-machined steel. -->
    <path d="M 540 158
             L 720 142
             L 770 196
             L 770 268
             L 720 320
             L 590 336
             L 530 290
             L 522 240
             L 540 215
             Z"/>

    <!-- Lever: tapered, more dramatic taper than v3. Wide at top -->
    <!-- (~120px) → narrower at bottom (~80px). Lean ~10° clockwise. -->
    <path d="M 593 336
             L 718 320
             L 535 760
             L 455 760
             Z"/>

    <!-- Foot pad: narrower than v3. Stays horizontal. -->
    <rect x="320" y="752" width="370" height="84" rx="22"/>
  </g>

  <!-- Pivot bolt detail. Three-step recess: an outer dark ring, inner -->
  <!-- light ring (catching light off the chamfer), then a dark center. -->
  <circle cx="650" cy="240" r="30" fill="#3A0F0D"/>
  <circle cx="650" cy="240" r="22" fill="#88201D"/>
  <circle cx="650" cy="240" r="14" fill="#0A0A0D"/>
</svg>
