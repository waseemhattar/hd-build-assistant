<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- v2: bigger, more substantial mark. v1 was too thin to read -->
  <!-- at 60×60. Lever 25% longer + 25% thicker. Foot pad 40% wider. -->
  <!-- Pivot dot 33% larger so it survives the App Library size test. -->
  <rect width="1024" height="1024" fill="#0E0E10"/>

  <g transform="rotate(22 512 512)">
    <!-- Thicker, longer lever -->
    <rect x="462" y="160" width="100" height="700" fill="#E8E2D5" rx="10"/>
    <!-- Wider, more visible foot pad -->
    <rect x="332" y="840" width="360" height="80" fill="#E8E2D5" rx="8"/>
  </g>

  <!-- Pivot dot — bigger (r=80 vs 60). Position: (512,160) rotated 22° -->
  <!-- around (512,512) → offset (132, -326) → (644, 186). -->
  <circle cx="644" cy="186" r="80" fill="#E03A36"/>
</svg>
